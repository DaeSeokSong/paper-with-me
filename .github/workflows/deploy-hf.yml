name: Deploy to Hugging Face

# 최신 데이터 스냅샷을 HF Datasets에 올리고 Docker Space를 동기화한다.
# 고정 크론(04:30)은 GitHub 크론 지연으로 수집(update-data)이 끝나기 전에
# 돌아 라이브가 하루 이상 뒤처지는 순서 결함이 있었다 — 수집 완료 시
# 연쇄 실행(workflow_run)으로 바꿔 '00시 수집 → 즉시 배포'를 보장한다.
# HF_TOKEN 시크릿이 없으면 안내만 하고 정상 종료한다.
on:
  workflow_dispatch:
  workflow_run:
    workflows: ["Update data (Phase 2 collectors)", "Backfill archive gap"]
    types: [completed]
  push:
    branches: [main]
    paths:
      - "app/**"
      - "pwc/**"
      - "Dockerfile"
      - "scripts/deploy_hf.py"
      # 배포 전 게이트가 이 스크립트를 실행하므로 변경 시 재배포 검증 필요
      - "scripts/smoke_check.py"
      - ".github/workflows/deploy-hf.yml"

permissions:
  contents: read
  actions: read

# 연속 push 시 두 배포가 같은 Space에 경쟁하지 않도록 직렬화한다
concurrency:
  group: deploy-hf
  cancel-in-progress: false

jobs:
  deploy:
    # 연쇄 실행일 때는 수집이 성공한 경우에만 배포한다 — 실패한 수집
    # 뒤에 배포해봤자 아티팩트 필터가 옛 스냅샷을 고르므로 낭비다
    if: github.event_name != 'workflow_run'
        || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 120  # 데이터 업로드 + Space 빌드/기동 대기(최장 85분) 포함
    env:
      PYTHONUNBUFFERED: "1"
      HF_TOKEN: ${{ secrets.HF_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install
        run: pip install huggingface_hub && pip install -e ".[stream,web,dev]"

      - name: Download latest verified snapshot artifact
        if: env.HF_TOKEN != ''
        uses: ./.github/actions/download-snapshot
        env:
          GH_TOKEN: ${{ github.token }}
        with:
          dest: data

      # 깨진 스냅샷이 라이브로 나가지 않도록 배포 직전에 게이트를 건다
      - name: Smoke check before deploying
        if: env.HF_TOKEN != ''
        run: PWC_DB=data/pwc.sqlite python scripts/smoke_check.py

      - name: Deploy to Hugging Face (data + Space)
        run: python scripts/deploy_hf.py
