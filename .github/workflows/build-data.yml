name: Build data snapshot

# 아카이브 덤프를 내려받아 SQLite 스냅샷을 빌드하고, 실데이터로 웹 앱의
# 핵심 기능(검색, 리더보드, 트렌드 등)을 스모크 점검한다.
# 이 워크플로 파일이 변경되어 push되면 자동 실행되고, 수동 실행도 가능하다.
on:
  workflow_dispatch:
  push:
    branches: [main]
    # 앱/스모크 체크만 바뀐 경우는 verify-app 워크플로가 아티팩트를 재사용해
    # 검증하므로, 재빌드는 파이프라인 코드가 바뀔 때만 한다.
    paths:
      - ".github/workflows/build-data.yml"
      - "pwc/**"

permissions:
  contents: read
  actions: read

# 연속 push로 다중 빌드가 겹치면 HF에서 수 GB 덤프를 동시에 받다가
# 429/5xx로 죽는다 — 직렬화하되 진행 중인 빌드는 낭비하지 않는다
concurrency:
  group: build-data
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      PYTHONUNBUFFERED: "1"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pipeline + web app
        run: pip install -e ".[stream,web,dev]"

      - name: Download previous snapshot (live 수집분 이관용)
        uses: ./.github/actions/download-snapshot
        env:
          GH_TOKEN: ${{ github.token }}
        with:
          dest: prev
          required: "false"

      - name: Download dumps and build SQLite
        run: python -m pwc build --data-dir data

      - name: Merge live-collected data from previous snapshot
        run: |
          if [ -f prev/pwc.sqlite ]; then
            python scripts/merge_live_data.py data/pwc.sqlite prev/pwc.sqlite
            rm -rf prev
          fi

      - name: Show stats
        run: |
          python -m pwc stats --data-dir data
          df -h /
          ls -lah data

      # 업로드를 스모크 게이트보다 먼저 수행한다 — 스냅샷 빌드는 100분짜리
      # 작업이라, 앱 쪽 점검 실패로 산출물까지 버려지면 안 된다.
      # 소비 워크플로들은 download-snapshot 액션이 '성공한 런의 아티팩트'만
      # 고르므로, 스모크에 실패한 이 업로드가 하류로 흘러가지는 않는다.
      - name: Upload snapshot artifact
        uses: actions/upload-artifact@v4
        with:
          name: pwc-sqlite
          path: data/pwc.sqlite
          retention-days: 30

      - name: Smoke check restored features against real data
        run: PWC_DB=data/pwc.sqlite python scripts/smoke_check.py
