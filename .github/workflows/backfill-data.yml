name: Backfill archive gap

# 아카이브 종료(2025-07)와 일일 수집 가동 사이의 논문 공백(~1년치)을
# arXiv API 제출일 범위 질의로 채운다. 멱등이라 재실행에 안전하다.
# 이 워크플로 파일이 merge되면 1회 자동 실행되고, 이후엔 수동 실행.
# (2026-07-11: 병렬 재빌드에 밀린 백필 계보 복구를 위해 재실행)
# (2026-07-11 #2: 대기열 1슬롯 규칙으로 취소된 백필 재큐잉 — GitHub
#  concurrency는 그룹당 대기 1개만 유지하므로, 연속 머지가 대기 중인
#  백필을 밀어낼 수 있다. 체크포인트 덕에 재실행은 이어달리기다.)
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - ".github/workflows/backfill-data.yml"

permissions:
  contents: read
  # 429 등으로 중단 시 부분 진행을 업로드하고 스스로 재실행하기 위해 write
  actions: write

# update-data와 같은 스냅샷 아티팩트를 읽고-쓴다 — 동시 실행 시 서로의
# 수집분을 덮어쓰지 않도록 스냅샷 기록자끼리 직렬화한다
concurrency:
  group: snapshot-writers
  cancel-in-progress: false

jobs:
  backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 300  # arXiv 예절(3s/요청) 페이지네이션 + 태깅·추출
    env:
      PYTHONUNBUFFERED: "1"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install
        run: pip install -e ".[stream,web,dev]"

      - name: Download latest verified snapshot artifact
        uses: ./.github/actions/download-snapshot
        env:
          GH_TOKEN: ${{ github.token }}
        with:
          dest: data

      - name: Backfill papers (2025-07 → today) + retag + re-extract
        run: python -m pwc backfill --data-dir data | tee backfill.log

      - name: Show stats
        run: python -m pwc stats --data-dir data

      # 백필이 스냅샷을 망가뜨렸으면 '최신 검증 아티팩트'가 되기 전에 차단
      - name: Smoke check against backfilled data
        run: PWC_DB=data/pwc.sqlite python scripts/smoke_check.py

      - name: Upload refreshed snapshot
        uses: actions/upload-artifact@v4
        with:
          name: pwc-sqlite
          path: data/pwc.sqlite
          retention-days: 30

      # arXiv 차단 등으로 중간에 멈췄고 이번 실행에서 진전이 있었다면,
      # 부분 스냅샷을 계보에 남긴 채 스스로 재실행해 체크포인트부터 잇는다
      # (진전 없는 중단은 재실행하지 않아 무한 루프를 막는다)
      - name: Continue from checkpoint if incomplete
        if: success()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if grep -q "INCOMPLETE_WITH_PROGRESS" backfill.log; then
            echo "부분 완료 — 체크포인트부터 재개하도록 재실행 요청"
            gh workflow run backfill-data.yml --ref main
          fi
