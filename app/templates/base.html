<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{% block title %}paper-with-me{% endblock %}</title>
<link rel="icon" href="/static/icon.svg" type="image/svg+xml">
<link rel="manifest" href="/static/manifest.webmanifest">
<link rel="apple-touch-icon" href="/static/icon.svg">
<meta name="theme-color" content="#ffffff">
<script>
/* 원본 paperswithcode.com에는 다크 모드가 없었다 — 기본은 원본 그대로의
   라이트 테마로 고정하고, 다크는 헤더 토글로 선택한 사용자에게만 적용한다.
   (OS 다크 설정을 따라가면 원본 UI 복원이 사용자에게 보이지 않는 문제) */
(function () {
  try {
    if (localStorage.getItem("theme") === "dark") {
      document.documentElement.setAttribute("data-theme", "dark");
    }
  } catch (e) {/* 저장소 접근 불가 시 라이트 유지 */}
})();
</script>
<style>
  :root {
    color-scheme: light;
    --blue: #21cbce;
    /* 원본 paperswithcode.com은 흰색 헤더였다 (원본 HTML 캡처로 확인) */
    --header: #ffffff;
    --header-fg: #333333;
    --header-fg-dim: #556270;
    --link: #1a73e8;
    --border: #e5e7eb;
    --bg: #ffffff;
    --fg: #222222;
    --muted: #667085;
    --card-bg: #ffffff;
    --badge-bg: #eef2f7;
    --badge-fg: #334155;
    --th-bg: #f8fafc;
    --input-bg: #f4f6f8;
    --input-border: #d6dde5;
    --input-fg: #222222;
  }
  :root[data-theme="dark"] {
      color-scheme: dark;
      --header: #0f1419;
      --header-fg: #ffffff;
      --header-fg-dim: #cbd5e1;
      --link: #7ab8ff;
      --border: #2a3441;
      --bg: #0f1419;
      --fg: #e2e8f0;
      --muted: #8b98a9;
      --card-bg: #161d26;
      --badge-bg: #223041;
      --badge-fg: #cbd5e1;
      --th-bg: #161d26;
      --input-bg: #1e2833;
      --input-border: #33404d;
      --input-fg: #ffffff;
  }
  * { box-sizing: border-box; }
  body { margin: 0; font-family: -apple-system, "Segoe UI", Roboto, "Noto Sans KR", sans-serif;
         color: var(--fg); background: var(--bg); }
  a { color: var(--link); text-decoration: none; }
  a:hover { text-decoration: underline; }
  header { background: var(--header); padding: 0 24px;
           border-bottom: 1px solid var(--border); }
  header .inner { max-width: 1100px; margin: 0 auto; display: flex; align-items: center;
                  gap: 20px; flex-wrap: wrap; }
  header a.brand { color: var(--header-fg); font-weight: 700; font-size: 18px;
                   padding: 14px 0; }
  header a.brand span { color: var(--blue); }
  header nav { display: flex; flex-wrap: wrap; gap: 2px 12px; }
  header nav a { color: var(--header-fg-dim); padding: 14px 4px; font-size: 14px; }
  header nav a:hover { color: var(--header-fg); text-decoration: none; }
  /* 원본 헤더 순서: 로고 → 검색 → 메뉴 */
  header nav { order: 1; }
  header input { background: var(--input-bg); border: 1px solid var(--input-border);
                 color: var(--input-fg); border-radius: 4px; padding: 7px 10px;
                 width: 200px; max-width: 70vw; }
  /* 원본에 없던 차별화 요소: 다크 모드 토글 (기본은 원본 라이트) */
  #theme-toggle { order: 2; margin-left: auto; background: none; border: none;
                  cursor: pointer; font-size: 17px; padding: 8px;
                  color: var(--header-fg-dim); line-height: 1; }
  #theme-toggle:hover { color: var(--header-fg); }
  .area-title { border-bottom: 1px solid var(--border); padding-bottom: 6px; }
  .see-all { color: var(--blue); font-size: 14px; }
  main { max-width: 1100px; margin: 0 auto; padding: 24px;
         overflow-wrap: anywhere; }
  h1 { font-size: 26px; } h2 { font-size: 20px; margin-top: 32px; }
  .card { border: 1px solid var(--border); border-radius: 8px; padding: 16px 18px;
          margin: 12px 0; background: var(--card-bg); }
  .card h3 { margin: 0 0 6px; font-size: 17px; }
  .muted { color: var(--muted); font-size: 13px; }
  .badge { display: inline-block; background: var(--badge-bg); border-radius: 12px;
           padding: 2px 10px; font-size: 12px; color: var(--badge-fg);
           margin: 2px 4px 2px 0; }
  .badge.official { background: #dcfce7; color: #166534; }
  .table-wrap { overflow-x: auto; }
  /* 표는 main의 overflow-wrap:anywhere를 물려받으면 좁은 화면에서 헤더가
     한 글자씩 세로로 깨진다 — 표 내부는 일반 줄바꿈 + 가로 스크롤로 처리 */
  table { border-collapse: collapse; width: 100%; margin: 10px 0 24px;
          font-size: 14px; overflow-wrap: normal; }
  th, td { border-bottom: 1px solid var(--border); text-align: left; padding: 8px 10px;
           vertical-align: top; }
  th { background: var(--th-bg); white-space: nowrap; }
  td { overflow-wrap: break-word; max-width: 420px; }
  .paper-meta { margin-bottom: 16px; }
  .abstract { max-width: 800px; line-height: 1.65; }
  .btn-row { display: flex; gap: 10px; align-items: center; margin: 16px 0 8px; }
  /* 원본 PDF/Abstract 버튼의 청록 그라데이션 (#02aab0→#00cdac, 원본 CSS 확인) */
  .btn { display: inline-block; border: none; border-radius: 6px;
         padding: 8px 18px; font-size: 14px; font-weight: 600; color: #fff;
         background: linear-gradient(to bottom, #02aab0 0%, #00cdac 100%); }
  .btn:hover { filter: brightness(1.06); text-decoration: none; color: #fff; }
  .repo-row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap;
              padding: 10px 14px; margin: 8px 0; }
  .rank { color: var(--muted); width: 36px; }
  /* 리더보드 상위권 하이라이트 — 1·2·3위 금·은·동 메달, 4~10위 옅은 강조.
     반투명 배경이라 라이트/다크 테마 모두에서 자연스럽다. */
  .rank-badge { display: inline-block; min-width: 24px; height: 24px;
                line-height: 24px; border-radius: 50%; text-align: center;
                font-weight: 700; font-size: 12px; }
  tr.rank-gold .rank-badge { background: #f7c948; color: #5b4300; }
  tr.rank-silver .rank-badge { background: #c5ced6; color: #333f4d; }
  tr.rank-bronze .rank-badge { background: #d9905a; color: #40260d; }
  tr.rank-gold td { background: rgba(247, 201, 72, .14); }
  tr.rank-silver td { background: rgba(176, 190, 197, .16); }
  tr.rank-bronze td { background: rgba(217, 144, 90, .14); }
  tr.rank-top td { background: rgba(33, 203, 199, .08); }
  .board-pager { align-items: center; flex-wrap: wrap; }
  .per-picker { margin-left: auto; }
  .per-picker a, .per-picker b { margin-left: 6px; }
  .stats { display: flex; gap: 24px; flex-wrap: wrap; margin: 16px 0; }
  .stats div { text-align: center; }
  .stats b { display: block; font-size: 22px; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
          gap: 12px; }
  .pager { margin: 20px 0; display: flex; gap: 12px; }
  footer { border-top: 1px solid var(--border); margin-top: 48px; padding: 20px 24px;
           font-size: 13px; color: var(--muted); text-align: center; }
  @media (max-width: 640px) {
    main { padding: 16px; }
    header { padding: 0 16px; }
    header .inner { gap: 4px 12px; }
    header a.brand { padding: 10px 0; }
    header nav a { padding: 6px 4px; }
    header form { margin-left: 0; width: 100%; padding-bottom: 10px; }
    header input { width: 100%; max-width: none; }
    .stats { gap: 16px; }
  }
</style>
</head>
<body>
<header><div class="inner">
  <a class="brand" href="/">paper<span>-with-</span>me</a>
  <nav>
    <a href="/papers">Papers</a>
    <a href="/sota">Browse State-of-the-Art</a>
    <a href="/datasets">Datasets</a>
    <a href="/methods">Methods</a>
    <a href="/trends">Trends</a>
  </nav>
  <form action="/search" method="get" role="search">
    <input type="search" name="q" placeholder="논문 검색…" aria-label="논문 검색"
           value="{{ paper_q or '' }}">
  </form>
  <button id="theme-toggle" type="button" aria-label="다크 모드 전환"
          title="다크 모드 전환">🌙</button>
</div></header>
<main>{% block content %}{% endblock %}</main>
<script>
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("/sw.js")
    .catch(function () {/* 미지원/비보안 컨텍스트는 무시 */});
}
(function () {
  var btn = document.getElementById("theme-toggle");
  var root = document.documentElement;
  function sync() {
    btn.textContent = root.getAttribute("data-theme") === "dark" ? "☀️" : "🌙";
  }
  btn.addEventListener("click", function () {
    var dark = root.getAttribute("data-theme") === "dark";
    if (dark) { root.removeAttribute("data-theme"); }
    else { root.setAttribute("data-theme", "dark"); }
    try { localStorage.setItem("theme", dark ? "light" : "dark"); } catch (e) {}
    sync();
  });
  sync();
})();
</script>
<footer>
  paper-with-me is a free resource with all data licensed under
  <a href="https://creativecommons.org/licenses/by-sa/4.0/">CC-BY-SA</a>.<br>
  Papers with Code 복원 프로젝트 (비공식, Meta와 무관) ·
  <a href="https://github.com/DaeSeokSong/paper-with-me">소스 코드</a> (AGPL-3.0) ·

  (2025-07 스냅샷 + 일일 갱신)
</footer>
</body>
</html>
