{% extends "base.html" %}
{% block title %}{{ task }} · SOTA · paper-with-me{% endblock %}
{% block content %}
<h1>{{ task }}</h1>
<p class="muted">{{ benchmarks | length }}개 벤치마크</p>
<div class="grid">
  {% for b in benchmarks %}
  <div class="card">
    <h3><a href="/sota/{{ task_slug }}/{{ b.slug }}">{{ b.dataset }}</a></h3>
    <div class="muted">결과 {{ b.n_rows }}개</div>
  </div>
  {% else %}<p>벤치마크가 없습니다.</p>{% endfor %}
</div>
{% endblock %}
